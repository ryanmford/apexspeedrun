    <style>
        /* Base Typography & Variables */
        :root {
            --asr-bg-dark: #09090b;
        }

        /* 1. LAYOUT PROTECTION */
        /* We return to a more standard flow but keep the background locked */
        html, body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--asr-bg-dark) !important;
            margin: 0 !important;
            padding: 0 !important;
            min-height: 100% !important;
            width: 100% !important;
            overscroll-behavior-y: none; /* Prevents bounce breaking fixed elements */
        }

        /* 2. SELECTIVE RESET */
        /* Instead of "all: unset" on everything, we target the problem areas */
        #root button {
            all: unset;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-sizing: border-box;
            text-align: center;
        }

        #root input {
            all: unset;
            box-sizing: border-box;
            width: 100%;
        }

        /* 3. NAV BAR FIX */
        /* This ensures the root is the container for fixed elements */
        #root {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            isolation: isolate;
        }

        /* 4. MAP PROTECTION */
        .leaflet-container img {
            max-width: none !important;
        }

        .font-mono { 
            font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; 
        }

        html {
            height: -webkit-fill-available;
            -webkit-text-size-adjust: 100%;
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }

        /* Ensure fixed elements stay on top of the map */
        nav, .bottom-nav-dock {
            z-index: 9999 !important;
        }
    </style>
</head>
<body class="text-slate-100 antialiased selection:bg-blue-500/30 selection:text-white">
