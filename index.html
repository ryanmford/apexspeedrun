    <style>
        /* 1. AGGRESSIVE HOST ISOLATION */
        /* We use !important everywhere to override whatever apexspeedrun.com is injecting */
        html, body { 
            background-color: #000000 !important;
            margin: 0 !important;
            padding: 0 !important;
            height: 100% !important;
            width: 100% !important;
            position: fixed !important; /* Prevents host site from scrolling underneath app */
            overflow: hidden !important;
        }

        /* 2. THE FIREWALL CONTAINER */
        #root {
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            bottom: 0 !important;
            height: 100dvh !important;
            width: 100vw !important;
            display: flex !important;
            flex-direction: column !important;
            overflow-y: auto !important;
            overflow-x: hidden !important;
            -webkit-overflow-scrolling: touch !important;
            background-color: #000000 !important;
            z-index: 999999 !important; /* Force to the very front */
        }

        /* 3. SURGICAL ELEMENT RESETS (Overriding High Specificity Site CSS) */
        /* If buttons are huge, it's usually because of "width: 100%" or "padding: 20px" on all buttons */
        #root button {
            all: unset !important;
            box-sizing: border-box !important;
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
            cursor: pointer !important;
            width: auto !important; 
            max-width: none !important;
            padding: 0 !important;
            margin: 0 !important;
        }

        /* If search bars are tiny, it's usually a "max-width" or "display: inline" issue */
        #root input {
            all: unset !important;
            box-sizing: border-box !important;
            display: block !important;
            width: 100% !important;
            max-width: none !important;
        }

        /* Prevent host site from breaking map markers */
        #root .leaflet-container img {
            max-width: none !important;
            height: auto !important;
        }

        /* Keep fixed nav elements inside the root container */
        #root nav, 
        #root .bottom-nav-dock {
            position: fixed !important;
            z-index: 1000 !important;
        }

        #root .bottom-nav-dock {
            bottom: 0 !important;
            left: 0 !important;
            right: 0 !important;
        }

        /* Font Restoration */
        body { 
            font-family: 'Inter', sans-serif !important; 
        }
        .font-mono { 
            font-family: 'JetBrains Mono', monospace !important; 
        }
    </style>
