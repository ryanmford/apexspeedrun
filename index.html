    <style>
        /* 1. VIEWPORT STABILIZATION */
        /* Force the browser to treat the app as the primary layer */
        html, body { 
            background-color: #000000 !important;
            margin: 0 !important;
            padding: 0 !important;
            height: 100% !important;
            width: 100% !important;
            overflow: hidden !important;
            position: fixed !important;
            left: 0 !important;
            top: 0 !important;
        }

        /* 2. APP CONTAINER ENFORCEMENT */
        #root {
            position: fixed !important;
            inset: 0 !important;
            height: 100dvh !important;
            width: 100vw !important;
            display: flex !important;
            flex-direction: column !important;
            background-color: #000000 !important;
            z-index: 2147483647 !important; /* Max possible z-index to beat host site overlays */
            overflow: hidden !important;
        }

        /* 3. SURGICAL COMPONENT FIXES */
        /* Fixes the huge buttons by stripping parent site's button/padding styles */
        #root button {
            all: unset !important;
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
            cursor: pointer !important;
            box-sizing: border-box !important;
            width: auto !important;
            height: auto !important;
            padding: 0 !important;
            margin: 0 !important;
        }

        /* Fixes tiny search bar by overriding host site input constraints */
        #root input {
            all: unset !important;
            display: block !important;
            width: 100% !important;
            height: 100% !important;
            box-sizing: border-box !important;
            color: inherit !important;
        }

        /* Nav Isolation: Force navs to respect the absolute viewport */
        #root nav {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            z-index: 100 !important;
        }

        #root .bottom-nav-dock {
            position: fixed !important;
            bottom: 0 !important;
            left: 0 !important;
            right: 0 !important;
            z-index: 100 !important;
            transform: translateZ(0); /* Force hardware acceleration */
        }

        /* 4. MAP & BUBBLE FIXES */
        /* Prevents host site from scaling map icons */
        #root .leaflet-container img {
            max-width: none !important;
            height: auto !important;
        }

        /* Scrollable content area fix */
        #root main {
            flex: 1 !important;
            overflow-y: auto !important;
            -webkit-overflow-scrolling: touch !important;
        }

        /* Font Restoration */
        body { font-family: 'Inter', sans-serif !important; }
        .font-mono { font-family: 'JetBrains Mono', monospace !important; }
    </style>
