<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Apex Speed Run</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts (Noto Sans for consistency) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons (Browser Ready) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Custom Styles (CSS Variables for Layout) -->
    <link rel="stylesheet" href="styles.css">

    <style>
        body {
            font-family: 'Noto Sans', sans-serif;
            margin: 0;
            background-color: #000; /* Matches your dark theme default */
        }
        /* Loading State Styling */
        #root:empty::before {
            content: "CONNECTING TO LIVE DATA";
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2563eb;
            font-weight: 900;
            letter-spacing: 0.4em;
            font-size: 12px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <!-- React Mount Point -->
    <div id="root"></div>

    <!-- 
      FIXED: Added type="module" to handle React imports correctly.
      Note: Ensure your React code is in index.js (or update the src below to app.js)
    -->
    <script type="module" src="index.js"></script>
</body>
</html>
